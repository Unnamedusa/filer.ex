<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wiki Privado - Dashboard</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>📚 Wiki Privado</h1>
            <div class="user-info">
                <span id="username"></span>
                <button id="logoutBtn" class="btn-logout">Cerrar Sesión</button>
            </div>
        </header>
        
        <div class="dashboard-content">
            <aside class="sidebar">
                <button id="newArticleBtn" class="btn btn-primary">+ Nuevo Artículo</button>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar artículos...">
                </div>
                <div id="articlesList" class="articles-list">
                    <!-- Lista de artículos se carga dinámicamente -->
                </div>
            </aside>
            
            <main class="main-content">
                <div id="articleView" class="article-view">
                    <div class="empty-state">
                        <p>Selecciona un artículo para ver su contenido</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
    
    <!-- Modal para crear/editar artículos -->
    <div id="articleModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3 id="modalTitle">Crear Nuevo Artículo</h3>
            <form id="articleForm">
                <input type="hidden" id="articleId">
                <div class="form-group">
                    <label for="articleTitle">Título:</label>
                    <input type="text" id="articleTitle" required>
                </div>
                <div class="form-group">
                    <label for="articleContent">Contenido:</label>
                    <textarea id="articleContent" rows="10" required></textarea>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="encryptCheckbox" checked>
                        Encriptar contenido
                    </label>
                </div>
                <div class="form-group">
                    <label>Archivos adjuntos:</label>
                    <input type="file" id="fileUpload" multiple>
                    <div id="attachedFiles"></div>
                </div>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>
        </div>
    </div>
    
    <script src="/js/api.js"></script>
    <script src="/js/crypto.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
